site_name: rclcpp_async
site_description: A header-only C++20 coroutine library for ROS 2
repo_url: https://github.com/otamachan/rclcpp_async

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide: guide.md
  - API Reference: api-reference.md

theme:
  name: material
  features:
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
